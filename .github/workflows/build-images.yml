name: Build and Push Images

on:
  push:
    branches: [main]
    paths:
      - "seedlings/classification_catboost/**"
      - "seedlings/feature_engineering/**"
      - "seedlings/regression_catboost/**"
      - "seedlings/finetuning_unsloth/**"
      - "seedlings/boosting_comparison/**"
      - "seedlings/sklearn_comparison/**"
      - "seedlings/time_series_forecasting/**"
      - "seedlings/anomaly_detection/**"
      - "seedlings/imbalanced_classification/**"
      - "seedlings/clustering_comparison/**"
      - "seedlings/text_classification/**"
  pull_request:
    branches: [main]
    paths:
      - "seedlings/classification_catboost/**"
      - "seedlings/feature_engineering/**"
      - "seedlings/regression_catboost/**"
      - "seedlings/finetuning_unsloth/**"
      - "seedlings/boosting_comparison/**"
      - "seedlings/sklearn_comparison/**"
      - "seedlings/time_series_forecasting/**"
      - "seedlings/anomaly_detection/**"
      - "seedlings/imbalanced_classification/**"
      - "seedlings/clustering_comparison/**"
      - "seedlings/text_classification/**"

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      classification_catboost: ${{ steps.filter.outputs.classification_catboost }}
      feature_engineering: ${{ steps.filter.outputs.feature_engineering }}
      regression_catboost: ${{ steps.filter.outputs.regression_catboost }}
      finetuning_unsloth: ${{ steps.filter.outputs.finetuning_unsloth }}
      boosting_comparison: ${{ steps.filter.outputs.boosting_comparison }}
      sklearn_comparison: ${{ steps.filter.outputs.sklearn_comparison }}
      time_series_forecasting: ${{ steps.filter.outputs.time_series_forecasting }}
      anomaly_detection: ${{ steps.filter.outputs.anomaly_detection }}
      imbalanced_classification: ${{ steps.filter.outputs.imbalanced_classification }}
      clustering_comparison: ${{ steps.filter.outputs.clustering_comparison }}
      text_classification: ${{ steps.filter.outputs.text_classification }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            classification_catboost:
              - 'seedlings/classification_catboost/**'
            feature_engineering:
              - 'seedlings/feature_engineering/**'
            regression_catboost:
              - 'seedlings/regression_catboost/**'
            finetuning_unsloth:
              - 'seedlings/finetuning_unsloth/**'
            boosting_comparison:
              - 'seedlings/boosting_comparison/**'
            sklearn_comparison:
              - 'seedlings/sklearn_comparison/**'
            time_series_forecasting:
              - 'seedlings/time_series_forecasting/**'
            anomaly_detection:
              - 'seedlings/anomaly_detection/**'
            imbalanced_classification:
              - 'seedlings/imbalanced_classification/**'
            clustering_comparison:
              - 'seedlings/clustering_comparison/**'
            text_classification:
              - 'seedlings/text_classification/**'

  build-classification-catboost:
    needs: changes
    if: needs.changes.outputs.classification_catboost == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/seedlings/classification_catboost
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: seedlings/classification_catboost
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-feature-engineering:
